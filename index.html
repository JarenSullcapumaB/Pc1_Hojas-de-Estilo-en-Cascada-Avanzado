<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Simple</title>
    <link rel="stylesheet" href="Diseño/diseño.css">
</head>
<body>
    <div class="container">
        <header class="header">Dashboard</header>
<br>
        <aside class="sidebar">
            <nav>
                <div>✉️ Menú</div>
                <div>📄Reportes</div>
                <div>👷Servicios</div>
                <div>⭐Favoritos</div>
                <div>🧑Usuarios</div>
                <div>⚙️Configuración</div>
            </nav>
        </aside>
<br>
        <main class="main">
            <h2>Panel de Control</h2>

            <section class="cards">
                <div class="card1">Ventas: S/500</div>
                <div class="card2">Usuarios: 120</div>
                <div class="card3">Visitas: 1,200</div>
                <div class="card4">Conversión: 5%</div>
            </section>

            <section class="reports">
                <div class="widget principal"><h1>Reporte Principal</h1> </div>
                <div class="widget1">Gráfico A</div>
                <div class="widget2">Gráfico B</div>
            </section>
        </main>
<br>
        <footer class="footer">Footer - @ Sullcapuma Bustamante Jaren John</footer>
    </div>
</body>
</html>
